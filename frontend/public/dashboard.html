<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <title>Incident-Hub | Dashboard</title>
    <link rel="stylesheet" href="assets/style.css">
</head>
<body>

    <div class="dashboard">
        <h2>Bienvenido a Incident-Hub</h2>

        <div class="cards">
            <div class="card">Total Incidencias</div>
            <div class="card">Incidencias Aprobadas</div>
            <div class="card">Pendientes de Validación</div>
        </div>
        <div class="crud-section">
            <div class="form-container">
                <h3 id="formTitle">Reportar Nuevo Incidente</h3>
                <form id="incidentForm">
                    <input type="hidden" id="incidentId">
                    <input type="text" id="incidentTitle" placeholder="Título del Incidente" required>
                    <textarea id="incidentDescription" placeholder="Describe el incidente..." required></textarea>
                    
                    <div class="select-group">
                        <select id="incidentPriority">
                            <option value="low">Prioridad: Baja</option>
                            <option value="medium" selected>Prioridad: Media</option>
                            <option value="high">Prioridad: Alta</option>
                        </select>
                        <select id="incidentStatus" style="display: none;">
                            <option value="pending" selected>Estado: Pendiente</option>
                            <option value="in_progress">Estado: En progreso</option>
                            <option value="resolved">Estado: Resuelto</option>
                        </select>
                    </div>

                    <button type="submit" id="submitBtn">Guardar Incidente</button>
                    <button type="button" id="cancelBtn" class="secondary-btn" style="display: none;" onclick="resetForm()">Cancelar Edición</button>
                </form>
            </div>

            <div class="list-container">
                <h3>Tus Incidentes</h3>
                <div id="incidentsList" class="incident-list"></div>
            </div>
        </div>

        <button class="logout-btn" onclick="logout()">Cerrar Sesión</button>
    </div>

<script src="js/dashboard.js"></script>
</body>
</html>
